apiVersion: apps/v1
kind: Deployment
metadata:
  name: groupfactory
  namespace: groupfactory
  labels:
    app.kubernetes.io/name: groupfactory
    app.kubernetes.io/component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: groupfactory
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: groupfactory
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: groupfactory
        image: registry.example.com/groupfactory:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
        envFrom:
        - configMapRef:
            name: telegram-config
        - secretRef:
            name: groupfactory-tg-auth
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 30
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
