apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: groupfactory
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/telegram-groupfactory.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: groupfactory
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
